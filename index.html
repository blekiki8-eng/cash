<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fish Cash Game</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --primary: #00d2ff; --bg: #0f172a; --card: #1e293b; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; margin: 0; padding-bottom: 100px; overflow-x: hidden; }
        .tab-content { display: none; flex-direction: column; align-items: center; padding: 20px; width: 100%; box-sizing: border-box; }
        .active { display: flex; }
        #lake { 
            width: 230px; height: 230px; 
            background: radial-gradient(circle at 30% 30%, #00f2fe, #004e92);
            border-radius: 50%; margin: 20px auto; position: relative;
            box-shadow: 0 0 40px rgba(0, 210, 255, 0.4); display: flex; align-items: center; justify-content: center;
        }
        #my-poplavok { width: 70px; height: 70px; position: absolute; display: none; z-index: 100; pointer-events: none; }
        .bite { animation: shake 0.2s infinite; }
        @keyframes shake { 0% { transform: translateY(0); } 50% { transform: translateY(12px); } 100% { transform: translateY(0); } }
        .stat-card { background: var(--card); border-radius: 20px; padding: 15px; width: 100%; margin-bottom: 15px; }
        .row { display: flex; justify-content: space-between; margin: 10px 0; }
        .game-btn { background: linear-gradient(135deg, #00d2ff, #3a7bd5); color: white; border: none; padding: 18px; border-radius: 50px; width: 100%; font-size: 18px; font-weight: bold; cursor: pointer; }
        .nav { position: fixed; bottom: 0; width: 100%; display: flex; background: #1e293b; padding-bottom: 25px; border-top: 1px solid #334155; }
        .nav-item { flex: 1; text-align: center; padding: 15px; color: #94a3b8; font-size: 12px; }
        .active-nav { color: var(--primary); font-weight: bold; }
    </style>
</head>
<body>

    <div id="profile" class="tab-content">
        <h2>ПРОФІЛЬ</h2>
        <div class="stat-card">
            <div class="row"><span>👤 Гравець:</span><span id="u-name">Завантаження...</span></div>
            <div class="row"><span>🆔 Мій ID:</span><span id="u-id">...</span></div>
            <div class="row"><span>💰 Баланс:</span><span id="balance" style="color: #fbbf24; font-weight: bold;">0</span></div>
        </div>
        <button class="game-btn" style="font-size: 14px; padding: 12px;" onclick="copyRef()">🔗 Запросити друга (+50 💰)</button>
    </div>

    <div id="fishing" class="tab-content active">
        <h2>ОЗЕРО</h2>
        <div id="lake">
            <img src="poplavok.png" id="my-poplavok">
            <div id="water-icon" style="font-size: 60px;">🌊</div>
        </div>
        <div id="status" style="height: 50px; text-align: center; margin-top: 10px;">Готовий?</div>
        <button id="action-btn" class="game-btn" onclick="handleAction()">ЗАКИНУТИ</button>
    </div>

    <div id="market" class="tab-content">
        <h2>МАРКЕТ</h2>
        <div class="stat-card">Магазин у розробці...</div>
    </div>

    <div class="nav">
        <div class="nav-item" onclick="tab('profile', this)">ПРОФІЛЬ</div>
        <div class="nav-item active-nav" onclick="tab('fishing', this)">ОЗЕРО</div>
        <div class="nav-item" onclick="tab('market', this)">МАРКЕТ</div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        const UID = String(tg.initDataUnsafe?.user?.id || "000000");
        let coins = 0, isFishing = false, canPull = false;

        async function load() {
            try {
                const r = await fetch(`/api/get_balance?user_id=${UID}`);
                const d = await r.json();
                const tgName = tg.initDataUnsafe?.user?.first_name || "Рибалка";
                
                document.getElementById('u-name').innerText = d.name || tgName;
                document.getElementById('u-id').innerText = UID;
                
                if (!d.error) {
                    coins = d.coins;
                    document.getElementById('balance').innerText = coins;
                }
            } catch (e) {
                document.getElementById('u-name').innerText = "Рибалка";
            }
        }

        async function save() {
            await fetch('/api/save_balance', {
                method: 'POST', headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ user_id: UID, coins: coins })
            });
        }

        function copyRef() {
            const link = `https://t.me/fishcash_gamebot?start=${UID}`;
            if (navigator.clipboard) {
                navigator.clipboard.writeText(link).then(() => tg.showAlert("Скопійовано!"));
            } else {
                tg.showAlert("Твоє посилання: " + link);
            }
        }

        function handleAction() {
            const btn = document.getElementById('action-btn');
            const st = document.getElementById('status');
            const pop = document.getElementById('my-poplavok');
            const wat = document.getElementById('water-icon');

            if (!isFishing) {
                isFishing = true; canPull = false;
                btn.innerText = "ЧЕКАЙ..."; btn.disabled = true;
                st.innerText = "Закидаємо...";
                
                const angle = Math.random() * Math.PI * 2;
                const dist = Math.random() * 70;
                pop.style.left = `calc(50% - 35px + ${Math.cos(angle)*dist}px)`;
                pop.style.top = `calc(50% - 35px + ${Math.sin(angle)*dist}px)`;
                pop.style.display = "block"; wat.style.display = "none";

                setTimeout(() => {
                    canPull = true; btn.disabled = false;
                    btn.innerText = "ТЯГНИ!"; pop.className = "bite";
                    tg.HapticFeedback.notificationOccurred('warning');
                }, Math.random() * 3000 + 2000);

            } else if (canPull) {
                isFishing = false; canPull = false;
                pop.style.display = "none"; pop.className = ""; wat.style.display = "block";
                
                const loot = Math.random() > 0.4 ? {n: "🐟 Риба", p: 10} : {n: "👞 Чобіт", p: -5};
                coins += loot.p; if (coins < 0) coins = 0;
                
                document.getElementById('balance').innerText = coins;
                st.innerHTML = `${loot.n} (${loot.p > 0 ? '+' : ''}${loot.p})`;
                btn.innerText = "ЗАКИНУТИ";
                save();
            }
        }

        function tab(id, el) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            if(el) {
                document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active-nav'));
                el.classList.add('active-nav');
            }
        }

        tg.expand();
        load();
    </script>
</body>
</html>
