<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FishCash Game</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --primary: #00d2ff; --bg: #0f172a; --card: #1e293b; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; margin: 0; padding-bottom: 80px; overflow-x: hidden; }
        .tab-content { display: none; flex-direction: column; align-items: center; padding: 20px; min-height: 100vh; box-sizing: border-box; }
        .active { display: flex; }
        
        #lake { width: 250px; height: 250px; background: radial-gradient(circle, #00f2fe, #004e92); border-radius: 50%; margin: 20px; border: 4px solid #1e293b; position: relative; overflow: hidden; }
        #poplavok { width: 45px; height: 45px; position: absolute; display: none; transition: all 0.5s ease; filter: drop-shadow(0 2px 5px black); }
        .bite { animation: shake 0.2s infinite; }
        @keyframes shake { 0%, 100% { transform: translate(0,0); } 50% { transform: translate(0,8px); } }

        .shelf { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; width: 100%; }
        .slot { background: var(--card); padding: 10px; border-radius: 12px; text-align: center; font-size: 11px; border: 1px solid #334155; }
        
        .nav { position: fixed; bottom: 0; width: 100%; display: flex; background: #1e293b; padding-bottom: 20px; border-top: 1px solid #334155; z-index: 100; }
        .nav-item { flex: 1; text-align: center; padding: 15px; color: #94a3b8; font-size: 10px; }
        .active-nav { color: var(--primary); font-weight: bold; }
        
        .main-btn { background: var(--primary); color: white; border: none; padding: 15px 30px; border-radius: 30px; font-weight: bold; width: 90%; }
        .btn-sml { border: none; color: white; padding: 6px; border-radius: 8px; font-size: 10px; width: 100%; margin-top: 5px; cursor: pointer; }
    </style>
</head>
<body>

    <div id="fishing-tab" class="tab-content active">
        <h2 id="l-lake">ОЗЕРО</h2>
        <div id="lake"><img src="poplavok.png" id="poplavok"></div>
        <div id="status" style="margin-bottom:15px; color:#94a3b8">...</div>
        <button id="action-btn" class="main-btn" onclick="startFishing()">ЗАКИНУТИ</button>
    </div>

    <div id="inventory-tab" class="tab-content">
        <h2 id="l-inv">СКЛАД</h2>
        <div id="inv-grid" class="shelf"></div>
    </div>

    <div id="market-tab" class="tab-content" style="width:100%">
        <h2 id="l-market">РИНОК</h2>
        <div id="market-list" style="width:100%"></div>
    </div>

    <div id="profile-tab" class="tab-content">
        <h2 id="l-prof">ПРОФІЛЬ</h2>
        <div style="background:var(--card); padding:20px; border-radius:15px; width:100%; border: 1px solid #334155;">
            <p>👤 <span id="l-name">Ім'я</span>: <b id="u-name">...</b></p>
            <p>🆔 ID: <b id="u-id">...</b></p>
            <p>💰 <span id="l-bal">Баланс</span>: <b id="balance" style="color:var(--primary)">0</b></p>
            <hr color="#334155">
            <button class="main-btn" style="width:100%; margin-bottom:10px;" onclick="shareRef()">📤 ЗАПРОСИТИ ДРУЗІВ</button>
        </div>
    </div>

    <div class="nav">
        <div class="nav-item active-nav" onclick="tab('fishing-tab', this)">ОЗЕРО</div>
        <div class="nav-item" onclick="tab('inventory-tab', this); renderInv();">СКЛАД</div>
        <div class="nav-item" onclick="tab('market-tab', this); loadMarket();">РИНОК</div>
        <div class="nav-item" onclick="tab('profile-tab', this)">ПРОФІЛЬ</div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        const UID = String(tg.initDataUnsafe?.user?.id || "000000");
        let coins = 0, inv = [], lang = 'uk', isFishing = false;

        const i18n = {
            uk: { cast: "ЗАКИНУТИ", pull: "ТЯГНИ!", wait: "Чекай...", bite: "КЛЮЄ!", lake: "ОЗЕРО", inv: "СКЛАД", market: "РИНОК", prof: "ПРОФІЛЬ", name: "Ім'я", bal: "Баланс", fish_small: "Мала рибка", fish_karas: "Карась", fish_pike: "ЩУКА" },
            en: { cast: "CAST", pull: "PULL!", wait: "Wait...", bite: "BITE!", lake: "LAKE", inv: "SHELF", market: "MARKET", prof: "PROFILE", name: "Name", bal: "Balance", fish_small: "Small fish", fish_karas: "Karas", fish_pike: "PIKE" }
        };

        async function load() {
            const r = await fetch(`/api/get_user?user_id=${UID}`);
            const d = await r.json();
            if(!d.error) {
                coins = d.coins; inv = d.inventory || []; lang = d.lang || 'uk';
                updateUI();
            }
        }

        function updateUI() {
            const t = i18n[lang];
            document.getElementById('balance').innerText = coins;
            document.getElementById('u-id').innerText = UID;
            document.getElementById('u-name').innerText = tg.initDataUnsafe?.user?.first_name || "Рибалка";
            document.getElementById('action-btn').innerText = isFishing ? t.pull : t.cast;
        }

        function shareRef() {
            // Оновлене посилання на правильного бота
            const url = `https://t.me/fishcash_gamebot?start=${UID}`;
            tg.openTelegramLink(`https://t.me/share/url?url=${encodeURIComponent(url)}&text=${encodeURIComponent("Давай ловити рибу разом у FishCash!")}`);
        }

        function startFishing() {
            const btn = document.getElementById('action-btn'), p = document.getElementById('poplavok'), st = document.getElementById('status'), t = i18n[lang];
            if (!isFishing) {
                isFishing = true; btn.innerText = t.pull; btn.disabled = true;
                p.style.display = "block"; p.style.left = "105px"; p.style.top = "105px";
                setTimeout(() => {
                    p.classList.add("bite"); st.innerText = t.bite; btn.disabled = false;
                    tg.HapticFeedback.notificationOccurred('success');
                }, 2000 + Math.random() * 3000);
            } else {
                isFishing = false; p.style.display = "none"; p.classList.remove("bite");
                let fId = Math.random() < 0.1 ? "fish_pike" : (Math.random() < 0.4 ? "fish_karas" : "fish_small");
                inv.push({id: fId});
                fetch('/api/save_user', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({user_id: UID, inventory: inv}) });
                updateUI();
            }
        }

        function renderInv() {
            const grid = document.getElementById('inv-grid'); grid.innerHTML = "";
            inv.forEach((item, idx) => {
                grid.innerHTML += `<div class="slot"><b>${i18n[lang][item.id]}</b>
                    <button class="btn-sml" style="background:#f59e0b" onclick="listMarket('${item.id}', ${idx})">Ринок</button>
                    <button class="btn-sml" style="background:#10b981" onclick="sellSystem('${item.id}', ${idx})">💰</button>
                </div>`;
            });
        }

        async function loadMarket() {
            const r = await fetch('/api/get_market');
            const lots = await r.json();
            const list = document.getElementById('market-list');
            list.innerHTML = "";
            lots.forEach(lot => {
                list.innerHTML += `<div style="background:var(--card); padding:10px; margin:5px; border-radius:10px; display:flex; justify-content:space-between; align-items:center;">
                    <span><b>${i18n[lang][lot.item_id]}</b><br><small>${lot.seller_name}</small></span>
                    <span><b>${lot.price} 💰</b> <button class="btn-sml" style="background:#3b82f6; width:50px" onclick='buyItem(${JSON.stringify(lot)})'>BUY</button></span>
                </div>`;
            });
        }

        async function sellSystem(id, idx) {
            const r = await fetch('/api/sell_system', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({user_id: UID, item_id: id}) });
            const d = await r.json();
            if(d.ok) { inv.splice(idx,1); coins = d.new_balance; updateUI(); renderInv(); }
        }

        async function listMarket(id, idx) {
            const pr = prompt("Введіть ціну продажу:");
            if(!pr || isNaN(pr)) return;
            const r = await fetch('/api/list_item', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({user_id: UID, item_id: id, price: pr}) });
            if((await r.json()).ok) { inv.splice(idx,1); renderInv(); }
        }

        async function buyItem(lot) {
            const r = await fetch('/api/buy_item', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({user_id: UID, lot: lot}) });
            if((await r.json()).ok) load();
        }

        function tab(id, el) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active-nav'));
            el.classList.add('active-nav');
        }

        tg.expand(); load();
    </script>
</body>
</html>
