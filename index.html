<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FishCash Game</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --primary: #00d2ff; --bg: #0f172a; --card: #1e293b; --shelf: #3e2723; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; margin: 0; padding-bottom: 90px; overflow-x: hidden; }
        .tab-content { display: none; flex-direction: column; align-items: center; padding: 15px; min-height: 100vh; box-sizing: border-box; }
        .active { display: flex; }
        
        #lake { width: 260px; height: 260px; background: radial-gradient(circle, #00f2fe, #004e92); border-radius: 50%; margin: 20px; border: 4px solid #1e293b; position: relative; overflow: hidden; box-shadow: 0 0 20px rgba(0,210,255,0.3); }
        #poplavok { width: 50px; height: 50px; position: absolute; display: none; transition: all 0.6s ease-in-out; z-index: 10; filter: drop-shadow(0 2px 5px black); }
        .bite { animation: shake 0.3s infinite; }
        @keyframes shake { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(10px); } }

        .shelf { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; background: var(--shelf); padding: 10px; border-radius: 10px; width: 100%; box-sizing: border-box; }
        .slot { background: var(--card); padding: 8px; border-radius: 8px; text-align: center; font-size: 11px; border: 1px solid #334155; }

        .market-slot { background: var(--card); padding: 12px; border-radius: 12px; margin-bottom: 8px; width: 100%; display: flex; justify-content: space-between; align-items: center; box-sizing: border-box; }
        .nav { position: fixed; bottom: 0; width: 100%; display: flex; background: #1e293b; padding-bottom: 20px; border-top: 1px solid #334155; }
        .nav-item { flex: 1; text-align: center; padding: 15px; color: #94a3b8; font-size: 10px; }
        .active-nav { color: var(--primary); font-weight: bold; }
        
        .main-btn { background: var(--primary); color: white; border: none; padding: 15px 30px; border-radius: 30px; font-weight: bold; width: 80%; box-shadow: 0 4px 15px rgba(0,210,255,0.4); }
        .btn-sml { border: none; color: white; padding: 5px; border-radius: 5px; font-size: 9px; margin-top: 4px; width: 100%; }
        .input-box { background: #0f172a; border: 1px solid #334155; color: white; padding: 10px; border-radius: 10px; flex: 1; font-size: 11px; }
    </style>
</head>
<body>

    <div id="fishing-tab" class="tab-content active">
        <h2 data-lang="nav_lake">LAKE</h2>
        <div id="lake"><img src="poplavok.png" id="poplavok"></div>
        <div id="status" data-lang="ready" style="margin-bottom:15px; color:#94a3b8">Ready?</div>
        <button id="action-btn" class="main-btn" onclick="startFishing()">CAST ROD</button>
    </div>

    <div id="inventory-tab" class="tab-content">
        <h2 data-lang="nav_inv">SHELVES</h2>
        <div id="inv-grid" class="shelf"></div>
    </div>

    <div id="market-tab" class="tab-content" style="width:100%">
        <h2 data-lang="nav_market">MARKET</h2>
        <div id="market-list" style="width:100%; padding:10px; box-sizing:border-box;"></div>
    </div>

    <div id="profile-tab" class="tab-content">
        <h2 data-lang="nav_prof">USER</h2>
        <div style="background:var(--card); padding:20px; border-radius:15px; width:100%; box-sizing:border-box; border: 1px solid #334155;">
            <p>👤 <span data-lang="name">Name</span>: <b id="u-name">...</b></p>
            <p>🆔 ID: <b id="u-id">...</b></p>
            <p>💰 <span data-lang="balance">Balance</span>: <b id="balance" style="color:var(--primary)">0</b></p>
            <hr border="1" color="#334155">
            <p style="font-size:11px; color:#94a3b8">Реферальне посилання:</p>
            <input id="ref-link" readonly class="input-box" style="width:100%; margin-bottom:10px">
            <button class="main-btn" onclick="copyRef()" style="width:100%; padding:10px">Копіювати</button>
        </div>
    </div>

    <div class="nav">
        <div class="nav-item active-nav" onclick="tab('fishing-tab', this)">ОЗЕРО</div>
        <div class="nav-item" onclick="tab('inventory-tab', this); renderInv();">СКЛАД</div>
        <div class="nav-item" onclick="tab('market-tab', this); loadMarket();">РИНОК</div>
        <div class="nav-item" onclick="tab('profile-tab', this)">ПРОФІЛЬ</div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        const UID = String(tg.initDataUnsafe?.user?.id || "000000");
        let coins = 0, inv = [], lang = 'uk', isFishing = false;

        const i18n = {
            en: { cast: "CAST ROD", pull: "CATCH!", ready: "Ready?", wait: "Wait...", bite: "BITE!", fish_small: "Small Fish", fish_karas: "Karas", fish_pike: "PIKE", balance: "Balance", name: "Name", nav_lake: "LAKE", nav_inv: "SHELVES", nav_market: "MARKET", nav_prof: "USER" },
            uk: { cast: "ЗАКИНУТИ", pull: "ТЯГНИ!", ready: "Готовий?", wait: "Чекай...", bite: "КЛЮЄ!", fish_small: "Мала рибка", fish_karas: "Карась", fish_pike: "ЩУКА", balance: "Баланс", name: "Ім'я", nav_lake: "ОЗЕРО", nav_inv: "СКЛАД", nav_market: "РИНОК", nav_prof: "ПРОФІЛЬ" }
        };

        async function load() {
            const r = await fetch(`/api/get_user?user_id=${UID}`);
            const d = await r.json();
            if(!d.error) {
                coins = d.coins; inv = d.inventory || []; lang = d.lang || 'uk';
                document.getElementById('balance').innerText = coins;
                document.getElementById('u-id').innerText = UID;
                document.getElementById('u-name').innerText = d.name || tg.initDataUnsafe?.user?.first_name || "Fisherman";
                document.getElementById('ref-link').value = `https://t.me/fishcash_gamebot?start=${UID}`;
                updateUI();
            }
        }

        function updateUI() {
            const t = i18n[lang];
            document.getElementById('action-btn').innerText = isFishing ? t.pull : t.cast;
        }

        function startFishing() {
            const btn = document.getElementById('action-btn'), p = document.getElementById('poplavok'), st = document.getElementById('status'), t = i18n[lang];
            if (!isFishing) {
                isFishing = true; btn.innerText = t.pull; btn.disabled = true; st.innerText = t.wait;
                p.style.display = "block"; p.style.left = "105px"; p.style.top = "105px";
                
                let moves = 0;
                const mi = setInterval(() => {
                    p.style.left = (Math.random() * 180 + 20) + "px";
                    p.style.top = (Math.random() * 180 + 20) + "px";
                    if (++moves >= 4) {
                        clearInterval(mi); p.classList.add("bite"); st.innerText = t.bite; btn.disabled = false;
                        tg.HapticFeedback.notificationOccurred('success');
                    }
                }, 800);
            } else {
                isFishing = false; p.style.display = "none"; p.classList.remove("bite");
                let fId = Math.random() < 0.1 ? "fish_pike" : (Math.random() < 0.4 ? "fish_karas" : "fish_small");
                inv.push({id: fId}); st.innerText = t[fId];
                fetch('/api/save_user', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({user_id: UID, inventory: inv}) });
            }
        }

        function renderInv() {
            const grid = document.getElementById('inv-grid'); grid.innerHTML = "";
            const t = i18n[lang];
            inv.forEach((item, idx) => {
                grid.innerHTML += `<div class="slot"><b>${t[item.id]}</b>
                    <button class="btn-sml" style="background:#f59e0b" onclick="listMarket('${item.id}', ${idx})">Market</button>
                    <button class="btn-sml" style="background:#10b981" onclick="sellSystem('${item.id}', ${idx})">Sell</button>
                </div>`;
            });
        }

        async function sellSystem(id, idx) {
            const r = await fetch('/api/sell_system', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({user_id: UID, item_id: id}) });
            const d = await r.json();
            if(d.ok) { inv.splice(idx,1); renderInv(); coins = d.new_balance; document.getElementById('balance').innerText = coins; }
        }

        async function listMarket(id, idx) {
            const pr = prompt("Ціна:");
            if(!pr || isNaN(pr)) return;
            const r = await fetch('/api/list_item', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({user_id: UID, item_id: id, price: pr}) });
            if((await r.json()).ok) { inv.splice(idx,1); renderInv(); }
        }

        async function loadMarket() {
            const list = document.getElementById('market-list');
            const r = await fetch('/api/get_market');
            const lots = await r.json();
            const t = i18n[lang];
            list.innerHTML = "";
            lots.forEach(lot => {
                list.innerHTML += `<div class="market-slot">
                    <div><b>${t[lot.item_id]}</b><br><small>${lot.seller_name}</small></div>
                    <div><b>${lot.price} 💰</b><br><button class="btn-sml" style="background:#3b82f6" onclick='buyItem(${JSON.stringify(lot)})'>BUY</button></div>
                </div>`;
            });
        }

        async function buyItem(lot) {
            const r = await fetch('/api/buy_item', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({user_id: UID, lot: lot}) });
            if((await r.json()).ok) load();
        }

        function tab(id, el) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active-nav'));
            el.classList.add('active-nav');
        }

        function copyRef() {
            const link = document.getElementById('ref-link');
            link.select(); document.execCommand('copy');
            tg.showPopup({ message: "Скопійовано!" });
        }

        tg.expand(); load();
    </script>
</body>
</html>
